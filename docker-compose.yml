services:
  windrose:
    build:
      context: .
    container_name: windrose_server
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Kyiv}
      APP_ID: ${APP_ID:-4129620}
      SERVER_EXE: ${SERVER_EXE:-R5/Binaries/Win64/WindroseServer-Win64-Shipping.exe}
      SERVER_ARGS: ${SERVER_ARGS:--log}
      SKIP_UPDATE: ${SKIP_UPDATE:-0}
      AUTO_RECREATE_PREFIX: ${AUTO_RECREATE_PREFIX:-1}
      WINEBOOT_TIMEOUT_SECS: ${WINEBOOT_TIMEOUT_SECS:-180}
      WINEPREFIX: ${WINEPREFIX:-/home/steam/windrose/pfx}
      WINEARCH: ${WINEARCH:-win64}
      WINEDEBUG: ${WINEDEBUG:--all}
      WINEESYNC: ${WINEESYNC:-1}
      WINEFSYNC: ${WINEFSYNC:-1}
      ROCKSDB_TMPFS: ${ROCKSDB_TMPFS:-0}
      ROCKSDB_BACKUP_INTERVAL: ${ROCKSDB_BACKUP_INTERVAL:-300}
    # Official guide: Windrose uses dynamic NAT punch-through (ICE/STUN).
    # Host mode avoids Docker bridge NAT side effects and port-guessing.
    network_mode: host
    volumes:
      - ./data:/home/steam/windrose
      - ./logs:/home/steam/logs
      - ./rocksdb-backup:/home/steam/rocksdb-backup
    tmpfs:
      - /tmpfs/rocksdb:size=2G
    stop_grace_period: 30s
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    stdin_open: true
    tty: true
